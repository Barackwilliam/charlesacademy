{% load static %}

<style>
/* ─── FAB ─── */
#xfab {
  position: fixed; bottom: 22px; right: 18px; z-index: 9999;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg,#4361ee,#7c3aed);
  border: none; cursor: pointer;
  box-shadow: 0 4px 18px rgba(67,97,238,.5);
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
#xfab svg { width: 24px; height: 24px; fill: #fff; pointer-events: none; }
#xbadge {
  position: absolute; top: -4px; right: -4px;
  background: #ef4444; color: #fff; font-size: 11px; font-weight: 700;
  min-width: 20px; height: 20px; border-radius: 10px; padding: 0 4px;
  display: none; align-items: center; justify-content: center;
  border: 2px solid #fff; pointer-events: none;
}

/* ─── CHAT BOX ───
   Desktop: fixed popup
   Mobile: uses JS to set exact pixel height so input is always visible
─── */
#xbox {
  display: none;                 /* opened by JS → flex */
  flex-direction: column;        /* stack header / body / input */
  position: fixed;
  z-index: 9998;
  overflow: hidden;
  background: #ece5dd;

  /* DESKTOP */
  bottom: 88px; right: 18px;
  width: 360px; height: 520px;
  border-radius: 18px;
  box-shadow: 0 16px 50px rgba(0,0,0,.22);
}

/* MOBILE: JS sets top/left/width/height explicitly via setMobileSize() */
@media (max-width: 500px) {
  #xbox {
    border-radius: 0;
    box-shadow: none;
  }
}

/* ─── HEADER ─── */
#xhead {
  flex: 0 0 auto;
  background: linear-gradient(135deg,#4361ee,#7c3aed);
  padding: 0 14px;
  height: 60px;
  display: flex; align-items: center; gap: 10px;
  color: #fff;
}
#xhead img {
  width: 36px; height: 36px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.4); object-fit: cover; flex-shrink: 0;
}
#xhead-init {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,.25);
  display: none; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
}
.xhi { flex: 1; min-width: 0; }
.xhi b { display: block; font-size: 14px; }
.xhi small { font-size: 11px; opacity: .85; display: flex; align-items: center; gap: 4px; }
.xdot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; }
.xhbtn {
  background: rgba(255,255,255,.18); border: none; color: #fff;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; margin-left: 4px;
  -webkit-tap-highlight-color: transparent;
}
.xhbtn:active { background: rgba(255,255,255,.4); }

/* ─── MESSAGES ─── */
#xmsgs {
  flex: 1 1 0;       /* fills all remaining space */
  min-height: 0;     /* CRITICAL: lets flexbox shrink this */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 10px;
  display: flex; flex-direction: column; gap: 2px;
}

/* date separator */
.xsep { text-align: center; margin: 6px 0; }
.xsep span {
  background: rgba(255,255,255,.8); color: #667781;
  font-size: 11px; padding: 2px 10px; border-radius: 8px;
}

/* ─── BUBBLES ─── */
.xrow { display: flex; margin-bottom: 1px; }
.xrow.student { justify-content: flex-end; }
.xrow.admin   { justify-content: flex-start; }
.xrow.student + .xrow.student,
.xrow.admin   + .xrow.admin { margin-top: -4px; }
.xbub {
  max-width: 80%; padding: 7px 10px 4px;
  font-size: 14px; line-height: 1.45; word-break: break-word;
  box-shadow: 0 1px 2px rgba(0,0,0,.1);
}
@media (max-width: 500px) { .xbub { font-size: 15px; max-width: 85%; } }
.xrow.admin .xbub {
  background: #fff; color: #111;
  border-radius: 0 10px 10px 10px; margin-left: 3px;
}
.xrow.admin.xc .xbub  { border-radius: 10px; }
.xrow.student .xbub {
  background: #dcf8c6; color: #111;
  border-radius: 10px 0 10px 10px; margin-right: 3px;
}
.xrow.student.xc .xbub { border-radius: 10px; }
.xmeta { display: flex; align-items: center; justify-content: flex-end; gap: 3px; margin-top: 3px; }
.xtime { font-size: 10px; color: #667781; }
.xrow.student .xtime { color: #5a9a52; }
.xtick { font-size: 11px; color: #53bdeb; }

/* ─── GUEST FORM ─── */
#xguest {
  flex: 1 1 0; min-height: 0;
  padding: 20px 16px;
  background: #f8fafc;
  display: none; flex-direction: column; gap: 12px;
  overflow-y: auto;
}
#xguest p { font-size: 14px; color: #475569; margin: 0; }
#xguest input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid #e2e8f0; border-radius: 12px;
  font-size: 16px; outline: none; box-sizing: border-box;
  background: #fff; -webkit-appearance: none;
}
#xguest input:focus { border-color: #4361ee; }
#xgbtn {
  padding: 13px; border: none; border-radius: 12px;
  background: linear-gradient(135deg,#4361ee,#7c3aed);
  color: #fff; font-weight: 600; font-size: 15px; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* ─── INPUT BAR ─── */
#xinput-bar {
  flex: 0 0 auto;   /* never shrinks — always visible */
  display: none;    /* JS → flex */
  align-items: flex-end;
  gap: 8px;
  padding: 8px 10px;
  background: #f0f2f5;
  border-top: 1px solid #dde1e7;
  box-sizing: border-box;
  /* safe area for iPhone home indicator */
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
#xinput {
  flex: 1;
  min-height: 42px; max-height: 108px;
  padding: 10px 14px;
  border: none; border-radius: 21px;
  font-size: 16px; /* 16px = NO iOS auto-zoom */
  line-height: 1.4; outline: none; resize: none;
  font-family: inherit; background: #fff;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
  -webkit-appearance: none; appearance: none;
  overflow-y: hidden; box-sizing: border-box;
}
#xsend {
  width: 42px; height: 42px; flex-shrink: 0;
  border-radius: 50%; border: none;
  background: linear-gradient(135deg,#4361ee,#7c3aed);
  color: #fff; cursor: pointer; align-self: flex-end;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(67,97,238,.4);
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
}
#xsend:active { transform: scale(.9); }
#xsend svg { pointer-events: none; }

/* ─── CLOSED NOTICE ─── */
#xclosed {
  flex: 0 0 auto; display: none;
  padding: 10px 14px; background: #fef2f2;
  color: #dc2626; font-size: 13px; text-align: center;
  border-top: 1px solid #fecaca;
}

/* ─── CONFIRM DELETE ─── */
#xconfirm {
  position: absolute; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  background: #fff; border-radius: 16px; padding: 18px 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,.22);
  z-index: 10; width: min(290px, 88%);
  text-align: center; display: none;
}
#xconfirm p { font-size: 13.5px; color: #1e293b; margin: 0 0 14px; }
#xconfirm .xbtns { display: flex; gap: 10px; justify-content: center; }
#xconfirm button {
  padding: 9px 20px; border-radius: 10px; border: none;
  font-size: 13.5px; font-weight: 600; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.xcanc { background: #f1f5f9; color: #475569; }
.xdel  { background: #ef4444; color: #fff; }
</style>

<!-- FAB -->
<button id="xfab" onclick="xchat.toggle()" aria-label="Open support chat">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <span id="xbadge"></span>
</button>

<!-- CHAT BOX -->
<div id="xbox">

  <!-- header -->
  <div id="xhead">
    <img src="{% static 'images/logo.jpeg' %}"
         onerror="this.style.display='none';document.getElementById('xhead-init').style.display='flex';" alt="">
    <div id="xhead-init">CA</div>
    <div class="xhi">
      <b>Support Team</b>
      <small><span class="xdot"></span> Online</small>
    </div>
    <button class="xhbtn" onclick="xchat.askDel()" title="Delete">🗑️</button>
    <button class="xhbtn" onclick="xchat.toggle()" title="Close">✕</button>
  </div>

  <!-- guest form -->
  <div id="xguest">
    <p>👋 Hi! Enter your name to start chatting.</p>
    <input id="xgname"  type="text"  placeholder="Your name *"      inputmode="text"  autocomplete="name">
    <input id="xgemail" type="email" placeholder="Email (optional)" inputmode="email" autocomplete="email">
    <button id="xgbtn" onclick="xchat.guestGo()">Start Chat →</button>
  </div>

  <!-- messages -->
  <div id="xmsgs" role="log" aria-live="polite"></div>

  <!-- closed notice -->
  <div id="xclosed">This chat has been closed. Thank you!</div>

  <!-- input bar -->
  <div id="xinput-bar">
    <textarea id="xinput" rows="1"
      placeholder="Type a message…"
      inputmode="text" enterkeyhint="send"
      oninput="xchat.resize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();xchat.send();}">
    </textarea>
    <button id="xsend" onclick="xchat.send()" aria-label="Send">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <!-- confirm delete -->
  <div id="xconfirm">
    <p>Delete this conversation?<br><small style="color:#94a3b8">This cannot be undone.</small></p>
    <div class="xbtns">
      <button class="xcanc" onclick="xchat.noDel()">Cancel</button>
      <button class="xdel"  onclick="xchat.yesDel()">Delete</button>
    </div>
  </div>

</div>

<script>
const xchat = (function(){
'use strict';

const URLS = {
  start : "{% url 'chat:start_chat' %}",
  send  : "{% url 'chat:send_message' %}",
  poll  : "{% url 'chat:poll_messages' '00000000-0000-0000-0000-000000000000' %}"
            .replace('00000000-0000-0000-0000-000000000000/',''),
  del   : "{% url 'chat:delete_session' %}",
};
const AUTH = {{ request.user.is_authenticated|yesno:"true,false" }};
const CSRF = "{{ csrf_token }}";

let sid=localStorage.getItem('xsid')||null, lastId=0, timer=null;
let open=false, unread=0, done=false, prevSender=null, seen=new Set();

const g  = id => document.getElementById(id);
const M  = ()  => g('xmsgs');
const IB = ()  => g('xinput-bar');

/* helpers */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

/* ── set box size on mobile ──
   This is the KEY fix: we calculate exact available height
   in pixels so the layout never overflows off screen
*/
function setSize(){
  const box = g('xbox');
  if(window.innerWidth > 500){
    // desktop: remove any inline size overrides
    box.style.top=''; box.style.left=''; box.style.width=''; box.style.height='';
    return;
  }
  // mobile: use visualViewport if available (accounts for keyboard + browser chrome)
  const vvh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  const vvw = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
  const top  = window.visualViewport ? window.visualViewport.offsetTop : 0;
  box.style.top    = top  + 'px';
  box.style.left   = '0px';
  box.style.width  = vvw  + 'px';
  box.style.height = vvh  + 'px';
  setTimeout(()=>{ M().scrollTop = M().scrollHeight; }, 60);
}

/* listen for keyboard open/close on mobile */
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', ()=>{ if(open) setSize(); });
  window.visualViewport.addEventListener('scroll', ()=>{ if(open) setSize(); });
}

/* badge */
function badge(n){
  unread=n; const b=g('xbadge');
  if(n>0){ b.textContent=n>9?'9+':String(n); b.style.display='flex'; g('xfab').style.background='linear-gradient(135deg,#ef4444,#dc2626)'; }
  else   { b.style.display='none'; g('xfab').style.background='linear-gradient(135deg,#4361ee,#7c3aed)'; }
}

/* bubbles */
function addBub(msg){
  const cont = prevSender===msg.sender;
  const row  = document.createElement('div');
  row.className = 'xrow '+msg.sender+(cont?' xc':'');
  const tick = msg.sender==='student'?'<span class="xtick">✓✓</span>':'';
  row.innerHTML = `<div class="xbub">${esc(msg.message)}<div class="xmeta"><span class="xtime">${msg.timestamp}</span>${tick}</div></div>`;
  M().appendChild(row); M().scrollTop=M().scrollHeight; prevSender=msg.sender;
}
function addSys(t){ const d=document.createElement('div'); d.className='xsep'; d.innerHTML=`<span>${esc(t)}</span>`; M().appendChild(d); M().scrollTop=M().scrollHeight; prevSender=null; }

/* show states */
function showGuest(){
  g('xguest').style.display     = 'flex';
  M().style.display              = 'none';
  IB().style.display             = 'none';
  g('xclosed').style.display    = 'none';
}
function showChat(){
  g('xguest').style.display     = 'none';
  M().style.display              = 'flex';
  g('xclosed').style.display    = 'none';
  if(!done) IB().style.display  = 'flex';
  setTimeout(()=>{ M().scrollTop=M().scrollHeight; },80);
}
function markDone(){
  done=true;
  IB().style.display            = 'none';
  g('xclosed').style.display   = 'block';
  stopPoll();
}

/* open / close */
function toggle(){
  open=!open;
  g('xbox').style.display = open ? 'flex' : 'none';
  g('xconfirm').style.display = 'none';
  if(open){
    setSize(); badge(0);
    if(!sid){ AUTH ? initAuth() : showGuest(); }
    else { showChat(); loadAll(); startPoll(); }
  } else {
    stopPoll();
    g('xinput').blur();
  }
}

/* guest */
function guestGo(){
  const name=g('xgname').value.trim(), email=g('xgemail').value.trim();
  if(!name){ g('xgname').style.borderColor='#ef4444'; return; }
  g('xgname').style.borderColor='#e2e8f0';
  post(URLS.start,{name,email}).then(d=>{
    if(!d) return; sid=d.session_id; localStorage.setItem('xsid',sid);
    showChat(); loadAll(); startPoll();
  });
}

/* auth */
function initAuth(){
  post(URLS.start,{}).then(d=>{
    if(!d) return; sid=d.session_id; localStorage.setItem('xsid',sid);
    showChat(); loadAll(); startPoll();
  });
}

/* load */
async function loadAll(){ lastId=0; prevSender=null; M().innerHTML=''; await pollOnce(); }

/* send */
function send(){
  const inp=g('xinput'), text=inp.value.trim();
  if(!text||!sid||done) return;
  inp.value=''; inp.style.height='auto';
  post(URLS.send,{session_id:sid,message:text}).then(d=>{
    if(d&&d.message&&!seen.has(d.message.id)){
      seen.add(d.message.id); if(d.message.id>lastId) lastId=d.message.id; addBub(d.message);
    }
  });
}

/* textarea resize */
function resize(ta){ ta.style.height='auto'; ta.style.height=Math.min(ta.scrollHeight,108)+'px'; M().scrollTop=M().scrollHeight; }

/* poll */
function startPoll(){ if(!timer) timer=setInterval(pollOnce,3000); }
function stopPoll(){ clearInterval(timer); timer=null; }
async function pollOnce(){
  if(!sid) return;
  try{
    const r=await fetch(`${URLS.poll}${sid}/?after=${lastId}`); if(!r.ok) return;
    const d=await r.json();
    d.messages.forEach(m=>{ if(m.id>lastId) lastId=m.id; if(seen.has(m.id)) return; seen.add(m.id); addBub(m); if(m.sender==='admin'&&!open){badge(unread+1);beep();} });
    if(d.session_status==='closed'&&!done){ markDone(); addSys('Chat closed by support. Thank you!'); }
  }catch(e){}
}

/* delete */
function askDel(){ g('xconfirm').style.display='block'; }
function noDel(){ g('xconfirm').style.display='none'; }
function yesDel(){
  if(sid) post(URLS.del,{session_id:sid});
  sid=null; lastId=0; prevSender=null; done=false; unread=0; seen.clear();
  localStorage.removeItem('xsid'); stopPoll();
  g('xconfirm').style.display='none'; g('xclosed').style.display='none';
  M().innerHTML=''; badge(0);
  AUTH?initAuth():showGuest();
}

/* http */
async function post(url,body){
  try{ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':CSRF},body:JSON.stringify(body)}); return r.ok?r.json():null; }catch(e){return null;}
}

/* beep */
function beep(){ try{ const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g2=c.createGain(); o.connect(g2);g2.connect(c.destination);o.frequency.value=880;g2.gain.setValueAtTime(.2,c.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);o.start();o.stop(c.currentTime+.3); }catch(e){} }

/* page load silent check */
if(sid){
  fetch(`${URLS.poll}${sid}/?after=0`).then(r=>r.ok?r.json():null).then(d=>{
    if(!d){sid=null;localStorage.removeItem('xsid');return;}
    let nu=0; d.messages.forEach(m=>{seen.add(m.id);if(m.id>lastId)lastId=m.id;if(m.sender==='admin'&&!m.is_read)nu++;});
    if(nu>0)badge(nu); if(d.session_status==='closed')done=true;
  }).catch(()=>{sid=null;localStorage.removeItem('xsid');});
}

return {toggle,guestGo,send,resize,askDel,noDel,yesDel};
})();
</script>
